name: generate animation

on:
  # Executa automaticamente todo dia
  schedule:
    - cron: "0 */24 * * *"
  # Permite rodar manualmente
  workflow_dispatch:
  # Executa em cada push na branch main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Gera o arquivo
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.gif
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=purple

      # Envia para a branch 'output'
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
